{% load static %}
<!DOCTYPE html>
<html lang="az">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Teacher</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:
            radial-gradient(circle at top left,
            rgba(34,197,94,0.18),
            transparent 35%),

            radial-gradient(circle at bottom right,
            rgba(139,92,246,0.16),
            transparent 35%),

            #050b1d;

            min-height:100vh;
        }

        .ai-page{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px;
        }

        .ai-card{
            width:900px;
            max-width:100%;
            background:#111827;
            border-radius:30px;
            padding:45px;
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:
            0 0 40px rgba(34,197,94,0.18);
        }

        .back-btn{
            display:inline-block;
            margin-bottom:30px;
            text-decoration:none;
            color:#22c55e;
            font-size:18px;
            font-weight:bold;
        }

        .ai-header{
            display:flex;
            align-items:center;
            gap:20px;
            margin-bottom:35px;
        }

        .ai-icon{
            width:90px;
            height:90px;
            border-radius:25px;
            background:linear-gradient(
            135deg,
            #22c55e,
            #8b5cf6
            );

            display:flex;
            align-items:center;
            justify-content:center;

            font-size:42px;

            box-shadow:
            0 0 35px rgba(34,197,94,0.35);
        }

        .ai-header h1{
            margin:0;
            color:white;
            font-size:60px;
        }

        .ai-header p{
            color:#cbd5e1;
            font-size:20px;
            margin-top:8px;
        }

        .ai-form{
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .ai-form textarea{
            width:100%;
            min-height:180px;
            border:none;
            outline:none;
            resize:vertical;

            border-radius:24px;

            background:#0f172a;

            color:white;

            padding:25px;

            font-size:18px;

            box-sizing:border-box;
        }

        .ai-form textarea::placeholder{
            color:#94a3b8;
        }

        .ai-form button{
            border:none;
            background:linear-gradient(
            135deg,
            #22c55e,
            #16a34a
            );

            color:white;

            padding:18px;

            border-radius:18px;

            font-size:20px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .ai-form button:hover{
            transform:translateY(-3px);
            box-shadow:
            0 15px 35px rgba(34,197,94,0.25);
        }

        .ai-response{
            margin-top:35px;
            background:#0f172a;
            padding:25px;
            border-radius:24px;
            border:1px solid rgba(139,92,246,0.35);
        }

        .ai-response h3{
            color:#a78bfa;
            margin-top:0;
        }

        .ai-response p{
            color:white;
            font-size:18px;
            line-height:1.8;
        }

    </style>

</head>

<body>

<div class="ai-page">

    <div class="ai-card">

        <a href="{% url 'home' %}"
           class="back-btn">

            ← Ana səhifə

        </a>

        <div class="ai-header">

            <div class="ai-icon">
                🤖
            </div>

            <div>

                <h1>AI Teacher</h1>

                <p>
                    Python, Django və proqramlaşdırma
                    suallarını cavablandır.
                </p>

            </div>

        </div>

        <form method="POST"
              class="ai-form">

            {% csrf_token %}

            <textarea
                name="question"
                placeholder="Sualını yaz... Məsələn: Django model nədir?"
                required></textarea>

            <button type="submit">

                ✨ AI Cavablandır

            </button>

        </form>

        {% if response %}

        <div class="ai-response">

            <h3>
                🤖 AI Cavabı
            </h3>

            <p>
                {{ response }}
            </p>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
